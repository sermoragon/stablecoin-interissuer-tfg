version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tfg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tfg_user
      POSTGRES_PASSWORD: tfg_pass
      POSTGRES_DB: tfg_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: